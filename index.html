<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified MCQ Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #111827;
            --panel: #1F2937;
            --text: #F9FAFB;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            background-color: var(--panel);
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        /* Top HUD (Heads Up Display) */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #374151;
        }
        .hud-stat {
            font-size: 1.1rem;
            font-weight: bold;
        }
        .pomodoro { color: #F59E0B; }
        .score { color: var(--success); }
        .streak { color: #3B82F6; }
        
        /* Question Area */
        #question-text {
            font-size: 1.4rem;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .option-btn {
            background-color: #374151;
            color: white;
            border: 2px solid transparent;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #4B5563;
            transform: translateY(-2px);
        }
        .option-btn:disabled { cursor: not-allowed; }
        .correct { background-color: var(--success) !important; color: white; }
        .wrong { background-color: var(--danger) !important; color: white; }
        
        #next-btn, #restart-btn {
            margin-top: 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            width: 100%;
            font-weight: bold;
        }
        #next-btn:hover, #restart-btn:hover { background-color: #4338CA; }
        
        /* Progress Bar */
        .progress-container {
            width: 100%;
            background-color: #374151;
            border-radius: 8px;
            margin-top: 20px;
            height: 10px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="hud" id="hud" style="display: none;">
        <div class="hud-stat pomodoro">🍅 <span id="time">25:00</span></div>
        <div class="hud-stat score">⭐ Score: <span id="score">0</span></div>
        <div class="hud-stat streak">🔥 Streak: <span id="streak">0</span></div>
    </div>

    <div id="game-area">
        <h2 id="question-text">Loading qbank.csv...</h2>
        <div class="options-grid" id="options-grid"></div>
        <button id="next-btn" onclick="nextQuestion()">Next Question ➔</button>
        <button id="restart-btn" onclick="location.reload()">Play Again</button>
        
        <div class="progress-container" id="progress-container" style="display: none;">
            <div id="progress-bar"></div>
        </div>
    </div>
</div>

<script>
    // State Variables
    let questions = [];
    let currentQuestionIndex = 0;
    
    // Gaming Role Variables
    let score = 0;
    let streak = 0;
    let multiplier = 1;

    // Pomodoro Role Variables
    let timeLeft = 25 * 60; // 25 minutes
    let timerInterval;

    // --- 1. AUTO LOAD & PARSE ROLE ---
    window.onload = async function() {
        try {
            const response = await fetch('qbank.csv');
            if (!response.ok) throw new Error('File not found');
            const csvText = await response.text();
            parseCSV(csvText);
            
            if (questions.length > 0) {
                startGame();
            } else {
                showError("qbank.csv is empty or badly formatted.");
            }
        } catch (error) {
            showError("Could not load qbank.csv. Are you running a local web server?");
        }
    };

    function parseCSV(csvText) {
        const lines = csvText.split('\n').filter(line => line.trim() !== '');
        lines.forEach(line => {
            // Simple split by comma. (Assumes no commas inside the questions/answers)
            const parts = line.split(',');
            if (parts.length >= 6) {
                questions.push({
                    question: parts[0].trim(),
                    options: [
                        { text: parts[1].trim(), isCorrect: parts[5].trim() === '1' },
                        { text: parts[2].trim(), isCorrect: parts[5].trim() === '2' },
                        { text: parts[3].trim(), isCorrect: parts[5].trim() === '3' },
                        { text: parts[4].trim(), isCorrect: parts[5].trim() === '4' }
                    ]
                });
            }
        });
    }

    function showError(msg) {
        document.getElementById('question-text').innerText = msg;
        document.getElementById('question-text').style.color = "var(--danger)";
    }

    // --- 2. SHUFFLE ROLE ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // --- 3. POMODORO ROLE ---
    function startPomodoro() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            document.getElementById('time').innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame("Pomodoro session complete!");
            }
        }, 1000);
    }

    // --- CORE GAME LOOP & GAMING ROLE ---
    function startGame() {
        shuffleArray(questions); // Shuffle the question bank
        document.getElementById('hud').style.display = 'flex';
        document.getElementById('progress-container').style.display = 'block';
        startPomodoro();
        loadQuestion();
    }

    function loadQuestion() {
        const currentQ = questions[currentQuestionIndex];
        document.getElementById('question-text').innerText = currentQ.question;
        const optionsGrid = document.getElementById('options-grid');
        optionsGrid.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        // Shuffle options for the current question
        let shuffledOptions = [...currentQ.options];
        shuffleArray(shuffledOptions);

        shuffledOptions.forEach((option) => {
            const button = document.createElement('button');
            button.innerText = option.text;
            button.classList.add('option-btn');
            button.onclick = () => selectAnswer(button, option.isCorrect, shuffledOptions);
            optionsGrid.appendChild(button);
        });

        updateProgress();
    }

    function selectAnswer(selectedBtn, isCorrect, allOptions) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true); // Lock answers

        if (isCorrect) {
            selectedBtn.classList.add('correct');
            streak++;
            multiplier = streak >= 3 ? 2 : 1; // Double points for streak >= 3
            score += (10 * multiplier);
            triggerMiniCelebration(); // Mini confetti for correct answer
        } else {
            selectedBtn.classList.add('wrong');
            streak = 0;
            // Highlight the actual correct answer
            buttons.forEach(btn => {
                const optionData = allOptions.find(o => o.text === btn.innerText);
                if (optionData && optionData.isCorrect) {
                    btn.classList.add('correct');
                }
            });
        }

        updateHUD();
        document.getElementById('next-btn').style.display = 'block';
    }

    function updateHUD() {
        document.getElementById('score').innerText = score;
        let streakText = streak;
        if (streak >= 3) streakText += " (x2 Pts!)";
        document.getElementById('streak').innerText = streakText;
    }

    function updateProgress() {
        const progress = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            endGame("Quiz Completed!");
        }
    }

    // --- 4. CELEBRATION ROLE ---
    function triggerMiniCelebration() {
        confetti({
            particleCount: 30,
            spread: 50,
            origin: { y: 0.8 },
            colors: ['#10B981', '#3B82F6']
        });
    }

    function endGame(message) {
        clearInterval(timerInterval);
        document.getElementById('question-text').innerText = message;
        document.getElementById('options-grid').innerHTML = 
            `<h2>Final Score: ${score}</h2><p>Longest Streak bonus applied!</p>`;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('restart-btn').style.display = 'block';
        document.getElementById('progress-bar').style.width = `100%`;

        // Big Celebration Confetti
        var duration = 3 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) { return clearInterval(interval); }
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
        }, 250);
    }
</script>
</body>
</html>
