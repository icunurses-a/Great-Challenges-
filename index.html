<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Full System</title>
    <style>
        /* Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden; position: relative;
        }

        /* Background Shapes */
        .circle {
            position: absolute; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            backdrop-filter: blur(5px); z-index: 1; animation: float 6s ease-in-out infinite;
        }
        .circle-1 { width: 150px; height: 150px; top: 20%; left: 30%; }
        .circle-2 { width: 200px; height: 200px; bottom: 20%; right: 30%; animation-delay: -3s; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }

        /* Glass Container */
        .glass-container {
            z-index: 2; width: 380px; padding: 50px 40px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            text-align: center; color: #fff;
        }

        h2 { font-size: 32px; font-weight: 600; margin-bottom: 30px; letter-spacing: 1px; }

        /* Form Elements */
        .input-group { margin-bottom: 20px; }
        input, select {
            width: 100%; padding: 15px 20px; border: none; border-radius: 30px;
            background: rgba(255, 255, 255, 0.2); color: #fff; font-size: 16px;
            outline: none; border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.3s ease;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.8); }
        input:focus, select:focus { background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255, 255, 255, 0.5); }
        select option { color: #333; } /* So text is readable when dropdown opens */

        button {
            width: 100%; padding: 15px 20px; margin-top: 10px; border: none; border-radius: 30px;
            background: #fff; color: #764ba2; font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }

        .links { margin-top: 25px; font-size: 14px; display: flex; justify-content: space-between; }
        .links a { color: #fff; text-decoration: none; cursor: pointer; transition: opacity 0.3s; }
        .links a:hover { opacity: 0.7; }

        /* Display utilities */
        .hidden { display: none; }
        #message-box { margin-top: 20px; font-size: 14px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="glass-container">
        <h2 id="form-title">Login</h2>

        <!-- LOGIN FORM -->
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-user" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Password" required>
            </div>
            <button type="submit">Log In</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signup-form" class="hidden">
            <div class="input-group">
                <input type="text" id="signup-user" placeholder="Choose Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="signup-pass" placeholder="Choose Password" required>
            </div>
            <div class="input-group">
                <select id="signup-role" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="Standard User">Standard User</option>
                    <option value="Manager">Manager</option>
                    <option value="Administrator">Administrator</option>
                </select>
            </div>
            <button type="submit">Create Account</button>
        </form>

        <!-- FORGOT PASSWORD FORM -->
        <form id="forgot-form" class="hidden">
            <div class="input-group">
                <input type="text" id="forgot-user" placeholder="Enter Username" required>
            </div>
            <button type="submit">Recover Password</button>
        </form>
        
        <div id="message-box"></div>

        <div class="links">
            <a id="link-forgot">Forgot Password?</a>
            <a id="link-toggle">Sign Up</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        
        // Form Elements
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const forgotForm = document.getElementById('forgot-form');
        const formTitle = document.getElementById('form-title');
        const messageBox = document.getElementById('message-box');
        
        // Link Elements
        const linkToggle = document.getElementById('link-toggle');
        const linkForgot = document.getElementById('link-forgot');

        // State Tracking
        let currentMode = 'login'; // login, signup, forgot

        // UI Toggling
        function switchMode(mode) {
            currentMode = mode;
            loginForm.classList.add('hidden');
            signupForm.classList.add('hidden');
            forgotForm.classList.add('hidden');
            messageBox.innerText = ""; // Clear messages

            if (mode === 'login') {
                formTitle.innerText = "Welcome";
                loginForm.classList.remove('hidden');
                linkToggle.innerText = "Sign Up";
                linkForgot.style.display = "block";
            } else if (mode === 'signup') {
                formTitle.innerText = "Register";
                signupForm.classList.remove('hidden');
                linkToggle.innerText = "Back to Login";
                linkForgot.style.display = "none";
            } else if (mode === 'forgot') {
                formTitle.innerText = "Recovery";
                forgotForm.classList.remove('hidden');
                linkToggle.innerText = "Back to Login";
                linkForgot.style.display = "none";
            }
        }

        linkToggle.addEventListener('click', () => {
            switchMode(currentMode === 'login' ? 'signup' : 'login');
        });

        linkForgot.addEventListener('click', () => {
            switchMode('forgot');
        });

        // Helper to handle API requests
        async function handleRequest(endpoint, payload) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                messageBox.style.color = response.ok ? '#98ff98' : '#ff9999';
                messageBox.innerText = data.message;
                
                if (response.ok && endpoint === '/signup') {
                    setTimeout(() => switchMode('login'), 2000); // go to login after success
                }
            } catch (error) {
                messageBox.style.color = '#ff9999';
                messageBox.innerText = "Server error. Is the Node.js server running?";
            }
        }

        // Submissions
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleRequest('/login', {
                username: document.getElementById('login-user').value,
                password: document.getElementById('login-pass').value
            });
        });

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleRequest('/signup', {
                username: document.getElementById('signup-user').value,
                password: document.getElementById('signup-pass').value,
                role: document.getElementById('signup-role').value
            });
        });

        forgotForm.addEventListener('submit', (e) => {
            e.preventDefault();
            handleRequest('/forgot', {
                username: document.getElementById('forgot-user').value
            });
        });
    </script>
</body>
</html>
