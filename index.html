<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive MCQ Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 800px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        /* Pomodoro Timer */
        .pomodoro {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--warning);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Gaming Elements */
        .gaming-stats {
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
        }
        .streak { color: #8b5cf6; font-weight: bold; }
        .score { color: var(--success); font-weight: bold; }
        .multiplier { color: #ec4899; font-size: 0.9rem; }

        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #334155;
            color: white;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #475569;
            border-color: var(--accent);
        }

        .option-btn.correct { background: var(--success); border-color: var(--success); }
        .option-btn.wrong { background: var(--error); border-color: var(--error); }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .next-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            display: none;
        }

        .next-btn:hover { background: #2563eb; }

        .rationale {
            margin-top: 20px;
            padding: 15px;
            background: #064e3b;
            border-left: 4px solid var(--success);
            border-radius: 4px;
            display: none;
        }

        .end-screen {
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard" id="dashboard">
            <div class="pomodoro" id="timer">⏱️ 25:00</div>
            <div class="gaming-stats">
                <div class="score">XP: <span id="score-val">0</span></div>
                <div class="streak">🔥 Streak: <span id="streak-val">0</span></div>
                <div class="multiplier" id="multiplier-val">1x Multiplier</div>
            </div>
        </div>

        <div id="quiz-area">
            <div id="question-counter" style="color: #94a3b8; margin-bottom: 10px;"></div>
            <div class="question-text" id="question-text">Loading question bank...</div>
            <div class="options" id="options"></div>
            <div class="rationale" id="rationale"></div>
            
            <div class="controls">
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question ➡️</button>
            </div>
        </div>

        <div class="end-screen" id="end-screen">
            <h2>🎉 Module Complete! 🎉</h2>
            <p style="font-size: 1.2rem; margin: 20px 0;">Total XP Earned: <span id="final-score" style="color: var(--success); font-weight: bold;"></span></p>
            <p id="performance-msg"></p>
            <button class="next-btn" style="display: inline-block; margin-top: 20px;" onclick="location.reload()">Restart Session</button>
        </div>
    </div>

    <script>
        let qbank = [];
        let currentQuestionIndex = 0;
        
        // Gaming Variables
        let score = 0;
        let streak = 0;
        let multiplier = 1;
        let answered = false;

        // Pomodoro Variables
        let timeRemaining = 25 * 60; // 25 minutes in seconds
        let timerInterval;

        // --- ROLE: AUTOMATIC LOAD & SHUFFLE ---
        document.addEventListener('DOMContentLoaded', () => {
            fetch('qbank.json')
                .then(response => {
                    if (!response.ok) throw new Error("Local file fetch blocked or missing.");
                    return response.json();
                })
                .then(data => {
                    qbank = shuffleArray(data); // Apply Shuffle Role
                    startPomodoro();            // Apply Pomodoro Role
                    loadQuestion();
                })
                .catch(error => {
                    document.getElementById('question-text').innerText = 
                        "Error: Cannot load qbank.json. Ensure you are running this via a local server (like VS Code Live Server) so the fetch API can read the local file.";
                });
        });

        // Fisher-Yates Shuffle Algorithm
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // --- ROLE: POMODORO ---
        function startPomodoro() {
            timerInterval = setInterval(() => {
                timeRemaining--;
                let minutes = Math.floor(timeRemaining / 60);
                let seconds = timeRemaining % 60;
                document.getElementById('timer').innerText = `⏱️ ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
                
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    alert("Pomodoro session complete! Take a 5-minute break.");
                }
            }, 1000);
        }

        // Load Question Data
        function loadQuestion() {
            answered = false;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('rationale').style.display = 'none';
            
            const q = qbank[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `Question ${currentQuestionIndex + 1} of ${qbank.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsDiv.appendChild(btn);
            });
        }

        // --- ROLE: GAMING ---
        function checkAnswer(selectedIndex, selectedBtn) {
            if (answered) return;
            answered = true;
            
            const q = qbank[currentQuestionIndex];
            const optionsDiv = document.getElementById('options');
            const btns = optionsDiv.getElementsByClassName('option-btn');
            
            // Show rationale
            const rationaleDiv = document.getElementById('rationale');
            rationaleDiv.innerText = q.rationale;
            rationaleDiv.style.display = 'block';

            if (selectedIndex === q.answer) {
                // Correct Answer - Gaming Logic applied
                selectedBtn.classList.add('correct');
                streak++;
                multiplier = Math.min(1 + (Math.floor(streak / 3) * 0.5), 3); // Max 3x multiplier
                let pointsEarned = 10 * multiplier;
                score += pointsEarned;
                
                // Mini celebration for streaks
                if (streak > 0 && streak % 3 === 0) {
                    triggerMiniCelebration();
                }

            } else {
                // Wrong Answer
                selectedBtn.classList.add('wrong');
                btns[q.answer].classList.add('correct');
                streak = 0;
                multiplier = 1;
            }

            // Update Gaming DOM
            document.getElementById('score-val').innerText = score;
            document.getElementById('streak-val').innerText = streak;
            document.getElementById('multiplier-val').innerText = `${multiplier}x Multiplier`;
            
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < qbank.length) {
                loadQuestion();
            } else {
                endQuiz();
            }
        }

        // --- ROLE: CELEBRATION ---
        function endQuiz() {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('end-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
            
            clearInterval(timerInterval);
            triggerGrandCelebration();
        }

        function triggerMiniCelebration() {
            confetti({
                particleCount: 50,
                spread: 60,
                origin: { y: 0.8 },
                colors: ['#3b82f6', '#8b5cf6']
            });
        }

        function triggerGrandCelebration() {
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }
    </script>
</body>
</html>
