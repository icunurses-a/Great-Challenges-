<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified MCQ Engine</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --primary: #bb86fc;
            --correct: #03dac6;
            --wrong: #cf6679;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #app-container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }

        /* Pomodoro & Gaming Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .stat-box {
            background: #333;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        #timer { color: #ffb74d; }
        #score-display { color: var(--primary); }
        #streak-display { color: #ffeb3b; }

        /* Quiz Area */
        #question {
            font-size: 1.3em;
            margin-bottom: 20px;
            min-height: 60px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        button.option-btn {
            background-color: #333;
            color: white;
            border: 2px solid transparent;
            padding: 15px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.option-btn:hover {
            background-color: #444;
            transform: scale(1.02);
        }

        button.option-btn:disabled {
            cursor: not-allowed;
            transform: none;
        }

        /* Feedback States */
        button.option-btn.correct { background-color: var(--correct); color: #000; border-color: var(--correct); }
        button.option-btn.wrong { background-color: var(--wrong); color: #000; border-color: var(--wrong); }

        /* Celebration Screen */
        #celebration-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(30, 30, 30, 0.95);
            border-radius: 12px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #celebration-screen h1 { font-size: 3em; margin-bottom: 10px; }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="stat-box" id="timer">🍅 25:00</div>
            <div class="stat-box" id="score-display">Score: 0</div>
            <div class="stat-box" id="streak-display">🔥 x0</div>
        </header>

        <main id="quiz-area">
            <div id="question">Loading questions...</div>
            <div class="options-grid" id="options-container"></div>
        </main>

        <div id="celebration-screen">
            <h1>🎉 You Did It! 🎉</h1>
            <p>Pomodoro Complete or Questions Finished!</p>
            <h2 id="final-score">Final Score: 0</h2>
            <button class="option-btn" onclick="location.reload()" style="background: var(--primary); margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script>
        /* --- GAME STATE --- */
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let streak = 0;
        let pomodoroTime = 25 * 60; // 25 minutes in seconds
        let timerInterval;

        /* --- 1. DATA LOADING ROLE --- */
        // Automatically fetches qbank.json when the page opens.
        async function loadQBank() {
            try {
                const response = await fetch('qbank.json');
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                questions = data;
                startGame();
            } catch (error) {
                console.warn("Could not load qbank.json. Using fallback mock data.");
                // Fallback data so the engine works even without a local server
                questions = [
                    { question: "What does HTML stand for?", options: ["Hyper Text Markup Language", "High Tech Modern Language", "Hyperlink and Text Markup Language", "Home Tool Markup Language"], answer: "Hyper Text Markup Language" },
                    { question: "Which CSS property controls the text size?", options: ["font-style", "text-size", "font-size", "text-style"], answer: "font-size" },
                    { question: "Inside which HTML element do we put the JavaScript?", options: ["<javascript>", "<scripting>", "<js>", "<script>"], answer: "<script>" }
                ];
                startGame();
            }
        }

        /* --- 2. SHUFFLING ROLE --- */
        // Fisher-Yates Shuffle Algorithm
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        /* --- 3. POMODORO TIMER ROLE --- */
        function startPomodoro() {
            const timerElement = document.getElementById('timer');
            timerInterval = setInterval(() => {
                if (pomodoroTime <= 0) {
                    clearInterval(timerInterval);
                    triggerCelebration("🍅 Focus Session Complete!");
                    return;
                }
                pomodoroTime--;
                let minutes = Math.floor(pomodoroTime / 60);
                let seconds = pomodoroTime % 60;
                timerElement.innerText = `🍅 ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        /* --- 4. GAMING & MCQ UI ROLE --- */
        function startGame() {
            questions = shuffleArray(questions); // Shuffle questions
            score = 0;
            streak = 0;
            currentQuestionIndex = 0;
            updateStats();
            startPomodoro();
            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex >= questions.length) {
                triggerCelebration("🏆 Quiz Completed!");
                return;
            }

            const currentQ = questions[currentQuestionIndex];
            document.getElementById('question').innerText = currentQ.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = ''; // Clear previous

            // Shuffle options for the current question
            const shuffledOptions = shuffleArray(currentQ.options);

            shuffledOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => handleAnswer(btn, option, currentQ.answer);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(btn, selectedOption, correctOption) {
            // Disable all buttons
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);

            if (selectedOption === correctOption) {
                // Correct Answer Logic
                btn.classList.add('correct');
                streak++;
                score += (10 * streak); // Gamification: Score multiplier based on streak
            } else {
                // Wrong Answer Logic
                btn.classList.add('wrong');
                streak = 0; // Break streak
                // Highlight the correct one
                allBtns.forEach(b => {
                    if (b.innerText === correctOption) b.classList.add('correct');
                });
            }

            updateStats();
            
            // Wait 1.5 seconds, then load next question
            setTimeout(() => {
                currentQuestionIndex++;
                renderQuestion();
            }, 1500);
        }

        function updateStats() {
            document.getElementById('score-display').innerText = `Score: ${score}`;
            document.getElementById('streak-display').innerText = `🔥 x${streak}`;
        }

        /* --- 5. CELEBRATION ROLE --- */
        function triggerCelebration(message) {
            clearInterval(timerInterval); // Stop timer
            const celebScreen = document.getElementById('celebration-screen');
            celebScreen.style.display = 'flex';
            celebScreen.querySelector('p').innerText = message;
            document.getElementById('final-score').innerText = `Final Score: ${score}`;
            
            // Simple Confetti Generator
            for(let i = 0; i < 50; i++) {
                let confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
            }
        }

        // Initialize App on Page Load
        window.onload = loadQBank;
    </script>
</body>
</html>
