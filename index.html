<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified MCQ Simulator</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #bb86fc;
            --correct: #03dac6;
            --wrong: #cf6679;
            --timer-bg: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 600px;
            text-align: center;
            position: relative;
        }
        .hidden { display: none !important; }
        
        /* Buttons */
        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; }
        
        .option-btn {
            display: block;
            width: 100%;
            background-color: #2c2c2c;
            color: var(--text-main);
            margin: 8px 0;
            text-align: left;
            border: 1px solid #444;
        }
        .option-btn:hover { background-color: #3d3d3d; border-color: var(--accent); }
        .option-btn.correct { background-color: var(--correct); color: #000; border-color: var(--correct); }
        .option-btn.wrong { background-color: var(--wrong); color: #000; border-color: var(--wrong); }

        /* File Upload Fallback */
        .file-upload { margin-top: 20px; padding-top: 20px; border-top: 1px solid #444; }
        input[type="file"] { color: var(--text-muted); }

        /* Timers */
        .header-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .timer-bar-container {
            width: 100%;
            height: 8px;
            background-color: var(--timer-bg);
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .timer-bar {
            height: 100%;
            background-color: var(--accent);
            width: 100%;
            transition: width 1s linear;
        }
        .timer-warning { background-color: var(--wrong); }

        /* Confetti Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas" class="hidden"></canvas>

<div class="container" id="setup-screen">
    <h2>MCQ Training Simulator</h2>
    <p id="load-status">Attempting to auto-load qbank.json...</p>
    
    <div id="mode-selection" class="hidden">
        <h3>Select Game Mode</h3>
        <button onclick="startGame('normal')">Normal (Untimed)</button>
        <button onclick="startGame('pomodoro')">Pomodoro (25 Min Session)</button>
        <button onclick="startGame('stress')">Stress Mode (15s / Question)</button>
    </div>

    <div id="fallback-upload" class="file-upload hidden">
        <p>Could not auto-load. Please select your qbank.json manually:</p>
        <input type="file" id="json-upload" accept=".json">
    </div>
</div>

<div class="container hidden" id="quiz-screen">
    <div class="header-stats">
        <span id="q-counter">Question: 1/10</span>
        <span id="timer-text">Time: ∞</span>
    </div>
    <div class="timer-bar-container hidden" id="timer-container">
        <div class="timer-bar" id="timer-bar"></div>
    </div>
    <h3 id="question-text" style="text-align: left; line-height: 1.5;">Loading question...</h3>
    <div id="options-container"></div>
    <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
</div>

<div class="container hidden" id="result-screen">
    <h2>Session Complete!</h2>
    <h1 id="score-text">0 / 0</h1>
    <p id="result-message"></p>
    <button onclick="location.reload()">Restart Simulator</button>
</div>

<script>
    // Global State
    let qbank = [];
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let mode = 'normal'; // normal, pomodoro, stress
    let mainTimerInterval;
    let stressTimerInterval;
    let timeLeft = 0;

    // DOM Elements
    const setupScreen = document.getElementById('setup-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const loadStatus = document.getElementById('load-status');
    const modeSelection = document.getElementById('mode-selection');
    const fallbackUpload = document.getElementById('fallback-upload');
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const nextBtn = document.getElementById('next-btn');
    const qCounter = document.getElementById('q-counter');
    const timerText = document.getElementById('timer-text');
    const timerContainer = document.getElementById('timer-container');
    const timerBar = document.getElementById('timer-bar');

    // 1. Load Data
    window.onload = () => {
        fetch('qbank.json')
            .then(response => {
                if (!response.ok) throw new Error("Network response was not ok");
                return response.json();
            })
            .then(data => {
                qbank = data;
                loadStatus.innerText = `Successfully loaded ${qbank.length} questions.`;
                modeSelection.classList.remove('hidden');
            })
            .catch(error => {
                loadStatus.innerText = "Auto-load failed. Running without a local server?";
                fallbackUpload.classList.remove('hidden');
            });
    };

    document.getElementById('json-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                qbank = JSON.parse(e.target.result);
                fallbackUpload.classList.add('hidden');
                loadStatus.innerText = `Successfully loaded ${qbank.length} questions.`;
                modeSelection.classList.remove('hidden');
            } catch (err) {
                alert("Invalid JSON format.");
            }
        };
        reader.readAsText(file);
    });

    // 2. Utility: Shuffle Array (Fisher-Yates)
    function shuffleArray(array) {
        let curId = array.length;
        while (0 !== curId) {
            let randId = Math.floor(Math.random() * curId);
            curId -= 1;
            let tmp = array[curId];
            array[curId] = array[randId];
            array[randId] = tmp;
        }
        return array;
    }

    // 3. Game Flow
    function startGame(selectedMode) {
        mode = selectedMode;
        currentQuestions = shuffleArray([...qbank]); 
        currentQuestionIndex = 0;
        score = 0;

        setupScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');

        if (mode === 'pomodoro') {
            timeLeft = 25 * 60; // 25 minutes
            startMainTimer();
        }

        renderQuestion();
    }

    function renderQuestion() {
        if (currentQuestionIndex >= currentQuestions.length) {
            endGame();
            return;
        }

        nextBtn.classList.add('hidden');
        optionsContainer.innerHTML = '';
        const q = currentQuestions[currentQuestionIndex];
        
        qCounter.innerText = `Question: ${currentQuestionIndex + 1} / ${currentQuestions.length}`;
        questionText.innerText = q.question;

        // Shuffle Options
        let options = shuffleArray([...q.options]);
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.answer);
            optionsContainer.appendChild(btn);
        });

        if (mode === 'stress') {
            startStressTimer();
        }
    }

    function checkAnswer(selectedBtn, selectedText, correctText) {
        // Disable all buttons
        const allBtns = optionsContainer.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.disabled = true);
        
        clearInterval(stressTimerInterval);

        if (selectedText === correctText) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            // Highlight correct one
            allBtns.forEach(btn => {
                if (btn.innerText === correctText) btn.classList.add('correct');
            });
        }
        nextBtn.classList.remove('hidden');
    }

    function nextQuestion() {
        currentQuestionIndex++;
        renderQuestion();
    }

    // 4. Timers
    function startMainTimer() {
        timerText.classList.remove('hidden');
        mainTimerInterval = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            let s = (timeLeft % 60).toString().padStart(2, '0');
            timerText.innerText = `Pomodoro: ${m}:${s}`;
            if (timeLeft <= 0) {
                clearInterval(mainTimerInterval);
                endGame();
            }
        }, 1000);
    }

    function startStressTimer() {
        clearInterval(stressTimerInterval);
        timerContainer.classList.remove('hidden');
        let stressTime = 15; // 15 seconds per question
        timerBar.style.width = '100%';
        timerBar.classList.remove('timer-warning');

        stressTimerInterval = setInterval(() => {
            stressTime--;
            let percentage = (stressTime / 15) * 100;
            timerBar.style.width = `${percentage}%`;
            
            if (stressTime <= 5) timerBar.classList.add('timer-warning');

            if (stressTime <= 0) {
                clearInterval(stressTimerInterval);
                const correctText = currentQuestions[currentQuestionIndex].answer;
                const allBtns = optionsContainer.querySelectorAll('.option-btn');
                allBtns.forEach(btn => {
                    btn.disabled = true;
                    if (btn.innerText === correctText) btn.classList.add('correct');
                });
                nextBtn.classList.remove('hidden');
            }
        }, 1000);
    }

    // 5. Completion & Celebration
    function endGame() {
        clearInterval(mainTimerInterval);
        clearInterval(stressTimerInterval);
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');

        const percentage = (score / currentQuestions.length) * 100;
        document.getElementById('score-text').innerText = `${score} / ${currentQuestions.length}`;
        
        const msg = document.getElementById('result-message');
        if (percentage >= 80) {
            msg.innerText = "Excellent performance! Ready for the clinical floor.";
            fireConfetti();
        } else if (percentage >= 60) {
            msg.innerText = "Good job, but keep reviewing those critical values.";
        } else {
            msg.innerText = "Time to hit the books again. You'll get it next time!";
        }
    }

    function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        canvas.classList.remove('hidden');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                color: `hsl(${Math.random() * 360}, 100%, 50%)`,
                speedY: Math.random() * 3 + 2,
                speedX: Math.random() * 2 - 1,
                rot: Math.random() * 360,
                rotSpeed: Math.random() * 10 - 5
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rot += p.rotSpeed;
                
                ctx.save();
                ctx.translate(p.x + p.w/2, p.y + p.h/2);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
                ctx.restore();
            });
            requestAnimationFrame(animate);
        }
        animate();
    }
</script>
</body>
</html>
