<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamified Pomodoro MCQ Test</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #1e1e2f;
            --panel: #2a2a40;
            --text: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            background-color: var(--panel);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        .dashboard {
            display: flex;
            justify-content: space-between;
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }
        .pomodoro {
            color: #fbbf24;
            font-size: 1.2rem;
        }
        .gaming-stats span {
            margin-left: 10px;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
            margin: 5px;
        }
        .btn:hover { opacity: 0.8; }
        .option-btn {
            display: block;
            width: 100%;
            background-color: #3b3b52;
            margin: 10px 0;
            text-align: left;
            padding: 15px;
        }
        .hidden { display: none !important; }
        #question-text { font-size: 1.4rem; margin-bottom: 1rem; }
        
        /* Celebration Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 1000;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="dashboard hidden" id="dashboard">
            <div class="pomodoro">⏱ <span id="timer">25:00</span></div>
            <div class="gaming-stats">
                <span>❤️ <span id="lives">3</span></span>
                <span>🔥 <span id="combo">x1</span></span>
                <span>🏆 <span id="score">0</span></span>
            </div>
        </div>

        <div id="upload-screen">
            <h2>Welcome to the Arena</h2>
            <p>Upload your <b>qbank.json</b> to begin your session.</p>
            <input type="file" id="file-input" accept=".json" style="margin-bottom: 20px;">
            <br>
            <button class="btn" onclick="startGame()">Load & Start Game</button>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="question-text">Question will appear here...</div>
            <div id="options-container"></div>
        </div>

        <div id="end-screen" class="hidden">
            <h2 id="end-title">Game Over!</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <button class="btn" onclick="location.reload()">Restart</button>
        </div>
    </div>

    <script>
        let questionBank = [];
        let currentIdx = 0;
        let score = 0;
        let lives = 3;
        let combo = 1;
        let timerInterval;

        // --- UPLOAD & PARSE ROLE ---
        function startGame() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files.length) {
                alert("Please select a qbank.json file first!");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.questions || !Array.isArray(data.questions)) throw new Error();
                    questionBank = data.questions;
                    initGame();
                } catch (err) {
                    alert("Invalid JSON format. Ensure it has a 'questions' array.");
                }
            };
            reader.readAsText(file);
        }

        // --- SHUFFLING ROLE ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            document.getElementById('upload-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            shuffleArray(questionBank);
            startPomodoro(25 * 60); // 25 minutes
            loadQuestion();
        }

        // --- POMODORO ROLE ---
        function startPomodoro(seconds) {
            const timerDisplay = document.getElementById('timer');
            timerInterval = setInterval(() => {
                let min = Math.floor(seconds / 60);
                let sec = seconds % 60;
                timerDisplay.textContent = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    endGame("Pomodoro Finished!");
                }
                seconds--;
            }, 1000);
        }

        // --- QUIZ & GAMING ROLE ---
        function loadQuestion() {
            if (currentIdx >= questionBank.length || lives <= 0) {
                endGame(lives > 0 ? "Quiz Completed!" : "Out of Lives!");
                return;
            }

            const q = questionBank[currentIdx];
            document.getElementById('question-text').textContent = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            // Shuffle options to prevent pattern memorization
            let options = [...q.options];
            shuffleArray(options);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, q.answer);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                score += (10 * combo);
                combo++;
            } else {
                lives--;
                combo = 1;
            }
            updateStats();
            currentIdx++;
            loadQuestion();
        }

        function updateStats() {
            document.getElementById('lives').textContent = lives;
            document.getElementById('combo').textContent = `x${combo}`;
            document.getElementById('score').textContent = score;
        }

        // --- CELEBRATION ROLE ---
        function endGame(message) {
            clearInterval(timerInterval);
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-title').textContent = message;
            document.getElementById('final-score').textContent = score;

            if (lives > 0) launchConfetti();
        }

        function launchConfetti() {
            const colors = ['#4f46e5', '#10b981', '#fbbf24', '#ef4444', '#ec4899'];
            for (let i = 0; i < 100; i++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(conf);
            }
        }
    </script>
</body>
</html>
