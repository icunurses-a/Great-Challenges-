<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Boss Mode Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --mint-green: #98ff98;
            --stress-red: rgba(255, 0, 0, 0.3);
            --boss-red: #ff0000;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            background-color: #0f0f1a;
            color: var(--text-main);
            transition: background-color 0.5s ease;
        }

        /* Canvas Background */
        #bg-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
        }

        /* Ambient overlays */
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; transition: background 0.3s ease;
        }
        .flash-happy { background: rgba(152, 255, 152, 0.3); }
        .flash-scary { background: rgba(0, 0, 0, 0.8); }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Floating Nav */
        header {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 1000px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px;
            z-index: 10;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 10px 20px;
            border-radius: 12px; cursor: pointer;
            font-family: 'Nunito', sans-serif; font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 rgba(255,255,255,0.2); /* 3D effect */
        }
        .nav-btn:hover {
            transform: translateY(-2px) scale(1.05);
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 15px rgba(255,255,255,0.4);
        }
        .nav-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(255,255,255,0.2);
        }

        /* Main Quiz Container */
        main {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 800px;
            padding: 40px; text-align: center;
            z-index: 5;
            transition: all 0.3s ease;
        }

        /* Progress Bar (Candy Stripe & Rider) */
        .progress-container {
            width: 100%; height: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px; margin-bottom: 30px;
            position: relative; overflow: visible;
        }
        .progress-fill {
            height: 100%; width: 0%;
            border-radius: 10px;
            background: repeating-linear-gradient(45deg, #ff6b6b, #ff6b6b 10px, #feca57 10px, #feca57 20px, #1dd1a1 20px, #1dd1a1 30px, #5f27cd 30px, #5f27cd 40px);
            background-size: 200% 200%;
            animation: candyStripe 2s linear infinite;
            transition: width 0.5s ease-in-out;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        .rider-emoji {
            position: absolute; top: -30px; left: 0%;
            font-size: 28px;
            transition: left 0.5s ease-in-out;
            transform: translateX(-50%);
            animation: riderBounce 0.5s infinite alternate;
        }

        /* Questions & Buttons */
        h2 { font-size: 28px; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .options-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px;
            position: relative;
        }

        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white; font-size: 18px;
            padding: 15px; border-radius: 12px;
            cursor: pointer; font-family: 'Nunito', sans-serif;
            transition: all 0.3s ease; position: relative;
            box-shadow: 0 5px 0 rgba(0,0,0,0.3);
        }
        .option-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }
        .option-btn:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* File Upload Fallback */
        #upload-section { margin-top: 20px; display: none; }

        /* --- Custom Animations --- */
        @keyframes candyStripe { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }
        @keyframes riderBounce { 0% { transform: translate(-50%, 0px); } 100% { transform: translate(-50%, -10px); } }
        
        .happy-bounce { animation: happyBounce 0.6s cubic-bezier(0.28, 0.84, 0.42, 1); box-shadow: 0 0 40px var(--mint-green); border-color: var(--mint-green); }
        @keyframes happyBounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -60%); } }

        .scary-shake { animation: scaryShake 0.4s ease-in-out; }
        @keyframes scaryShake { 0%, 100% { transform: translate(-50%, -50%); } 25% { transform: translate(-52%, -48%); } 50% { transform: translate(-48%, -52%); } 75% { transform: translate(-53%, -50%); } }

        .stress-beat { animation: stressBeat 0.8s infinite; border-color: red !important; box-shadow: 0 0 30px red !important; }
        @keyframes stressBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* Rocket Crush Animation Set */
        .rocket-fly {
            z-index: 100;
            animation: flyRocket 1.5s forwards;
        }
        @keyframes flyRocket {
            0% { transform: scale(1); }
            30% { transform: translateX(300px) scale(1.2) rotate(15deg); }
            60% { transform: translateX(-300px) scale(1.2) rotate(-15deg); }
            100% { transform: translateX(0) scale(1.5); background: #00ffcc; color: black; box-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc; font-weight: 900;}
        }
        .crushed {
            animation: crushAway 0.5s forwards;
            pointer-events: none;
        }
        @keyframes crushAway {
            to { transform: scale(0); opacity: 0; }
        }

        /* --- Boss Mode --- */
        .boss-mode body { background-color: #050000; }
        .boss-mode main.glass { border-color: var(--boss-red); box-shadow: 0 0 50px rgba(255,0,0,0.5); }
        .boss-mode h2 { color: #ff4d4d; text-shadow: 0 0 10px red; }

        /* --- Drag & Drop Pomodoro --- */
        #pomodoro {
            position: absolute; top: 100px; right: 50px;
            width: 100px; height: 100px;
            border-radius: 40px; /* Squircle default */
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; cursor: grab; z-index: 50;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.4);
            user-select: none;
        }
        #pomodoro:active { cursor: grabbing; }
        #pomodoro.classic { background: linear-gradient(135deg, #ff4d4d, #1dd1a1); }
        #pomodoro.cyber { background: linear-gradient(135deg, #ff00ff, #00ffff); }
        #pomodoro.ocean { background: linear-gradient(135deg, #0984e3, #00cec9); }
        
        #pomodoro.shape-circle { border-radius: 50%; }
        #pomodoro.shape-square { border-radius: 15px; }
        #pomodoro.shape-squircle { border-radius: 40px; }

        #timer-text { font-size: 22px; font-weight: 900; color: white; text-shadow: 0 0 5px black;}
        #timer-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px;}

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-content {
            background: rgba(20,20,30,0.9); padding: 30px; border-radius: 20px;
            width: 80%; max-width: 600px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
        }
        .theme-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div id="flash-overlay"></div>

    <header class="glass">
        <div>
            <button class="nav-btn" onclick="openThemeModal()">🪄 Backgrounds</button>
            <button class="nav-btn" onclick="shuffleQuestions()">🔀 Shuffle PDF Q's</button>
            <button class="nav-btn" onclick="toggleBossMode()">👿 Boss Mode</button>
        </div>
        <div style="font-weight: 900; font-size: 20px;">Score: <span id="score-display">0</span></div>
    </header>

    <div id="pomodoro" class="classic shape-squircle">
        <div id="timer-text">25:00</div>
        <div id="timer-label">Work</div>
    </div>

    <main class="glass" id="quiz-container">
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
            <div class="rider-emoji" id="rider">🚲</div>
        </div>

        <div id="upload-section">
            <p>Could not auto-load <code>qbank.json</code> (Needs a local server).</p>
            <input type="file" id="file-input" accept=".json" class="nav-btn" style="width:100%">
        </div>

        <div id="question-section" style="display:none;">
            <h2 id="question-text">Loading Questions...</h2>
            <div class="options-grid" id="options-container"></div>
        </div>
    </main>

    <div class="modal" id="theme-modal">
        <div class="modal-content glass">
            <h2>Select Environment</h2>
            <div class="theme-grid">
                <button class="nav-btn" onclick="setTheme(0)">Cardio ECG</button>
                <button class="nav-btn" onclick="setTheme(1)">Particle Net</button>
                <button class="nav-btn" onclick="setTheme(2)">Starfield</button>
                <button class="nav-btn" onclick="setTheme(3)">DNA Helix</button>
                <button class="nav-btn" onclick="setTheme(4)">Floating Hearts</button>
                <button class="nav-btn" onclick="setTheme(5)">Medical Matrix</button>
                <button class="nav-btn" onclick="setTheme(6)">Bokeh Lights</button>
                <button class="nav-btn" onclick="setTheme(7)">Synthwave</button>
                <button class="nav-btn" onclick="setTheme(8)">Hexagon Tech</button>
                <button class="nav-btn" onclick="setTheme(9)">Aurora Waves</button>
            </div>
            <br>
            <button class="nav-btn" onclick="closeThemeModal()" style="background: red;">Close</button>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <h3>Pomodoro Settings</h3>
            <button class="nav-btn" onclick="changePomodoro('cyber', 'shape-circle')">Cyber Circle</button>
            <button class="nav-btn" onclick="changePomodoro('ocean', 'shape-square')">Ocean Square</button>
            <button class="nav-btn" onclick="changePomodoro('classic', 'shape-squircle')">Classic Squircle</button>
        </div>
    </div>

<script>
    /* =========================================
       1. CORE STATE & DATA LOADING
    ========================================= */
    let questions = [];
    let currentQIndex = 0;
    let score = 0;
    let isBossMode = false;
    let answered = false;

    // The evolution array
    const riders = ['🚲', '🛵', '🏎️', '🚀', '👑'];

    // Try auto-loading JSON, fallback to file input
    window.onload = async () => {
        try {
            const response = await fetch('qbank.json');
            if (!response.ok) throw new Error("File not found via HTTP");
            const data = await response.json();
            initQuiz(data);
        } catch (e) {
            console.log("Local fetch failed. Showing upload button.");
            document.getElementById('upload-section').style.display = 'block';
        }
        initCanvasEngine();
    };

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                initQuiz(data);
            } catch(err) {
                alert("Invalid JSON format!");
            }
        };
        reader.readAsText(file);
    });

    function initQuiz(data) {
        questions = data;
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('question-section').style.display = 'block';
        if(questions.length > 30) shuffleQuestions(); // Snuffling feature to 30
        renderQuestion();
    }

    function shuffleQuestions() {
        questions = questions.sort(() => Math.random() - 0.5).slice(0, 30);
        currentQIndex = 0;
        score = 0;
        document.getElementById('score-display').innerText = score;
        renderQuestion();
    }

    /* =========================================
       2. UI RENDERING & LOGIC
    ========================================= */
    function renderQuestion() {
        answered = false;
        if(currentQIndex >= questions.length) {
            document.getElementById('question-text').innerText = "Quiz Complete! Masterful!";
            document.getElementById('options-container').innerHTML = `<button class="nav-btn" onclick="shuffleQuestions()">Restart with New Shuffle</button>`;
            return;
        }

        const q = questions[currentQIndex];
        document.getElementById('question-text').innerText = q.question || "Missing Question Text";
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // Extract options assuming format: { question: "...", options: ["A", "B"], answer: 0 }
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(index, btn, q.answer);
            container.appendChild(btn);
        });

        updateProgress();
    }

    function updateProgress() {
        const percent = ((currentQIndex) / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${percent}%`;
        document.getElementById('rider').style.left = `${percent}%`;

        // Dynamic Evolution
        const riderIndex = Math.min(Math.floor((percent / 100) * riders.length), riders.length - 1);
        document.getElementById('rider').innerText = riders[riderIndex] || '🚲';
    }

    function handleAnswer(selectedIndex, btn, correctIndex) {
        if (answered) return;
        answered = true;
        
        const mainUi = document.getElementById('quiz-container');
        const flash = document.getElementById('flash-overlay');
        const buttons = document.querySelectorAll('.option-btn');

        if (selectedIndex === correctIndex) {
            // CORRECT ROUTE
            score++;
            document.getElementById('score-display').innerText = score;
            
            // Happy Bounce & Glow
            mainUi.classList.add('happy-bounce');
            flash.classList.add('flash-happy');
            fireDoubleConfetti(btn.getBoundingClientRect());

            // ROCKET CRUSH ANIMATION
            btn.classList.add('rocket-fly');
            buttons.forEach(b => {
                if (b !== btn) b.classList.add('crushed');
            });

            setTimeout(() => {
                mainUi.classList.remove('happy-bounce');
                flash.classList.remove('flash-happy');
                currentQIndex++;
                renderQuestion();
            }, 2000);

        } else {
            // WRONG ROUTE (Scary Shake, Stress)
            mainUi.classList.add('scary-shake');
            flash.classList.add('flash-scary');
            document.body.classList.add('stress-beat');

            // Show correct answer by highlighting it
            buttons[correctIndex].style.background = "#00ffcc";
            buttons[correctIndex].style.color = "black";
            buttons[selectedIndex].style.background = "red";

            setTimeout(() => {
                mainUi.classList.remove('scary-shake');
                flash.classList.remove('flash-scary');
                document.body.classList.remove('stress-beat');
                currentQIndex++;
                renderQuestion();
            }, 2000);
        }
    }

    /* =========================================
       3. CONFETTI (Double Burst)
    ========================================= */
    function fireDoubleConfetti(rect) {
        // Simple built-in confetti logic to avoid external APIs
        const createBurst = (delay) => {
            setTimeout(() => {
                for(let i=0; i<30; i++) {
                    const conf = document.createElement('div');
                    conf.style.position = 'fixed';
                    conf.style.left = (rect.left + rect.width/2) + 'px';
                    conf.style.top = (rect.top + rect.height/2) + 'px';
                    conf.style.width = '10px'; conf.style.height = '10px';
                    conf.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
                    conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    conf.style.pointerEvents = 'none';
                    conf.style.zIndex = '999';
                    document.body.appendChild(conf);

                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 5 + Math.random() * 10;
                    let tx = Math.cos(angle) * velocity * 20;
                    let ty = Math.sin(angle) * velocity * 20;

                    conf.animate([
                        { transform: 'translate(0,0) scale(1)', opacity: 1 },
                        { transform: `translate(${tx}px, ${ty}px) scale(0) rotate(360deg)`, opacity: 0 }
                    ], { duration: 1000, easing: 'cubic-bezier(0.25, 1, 0.5, 1)' });

                    setTimeout(() => conf.remove(), 1000);
                }
            }, delay);
        };
        createBurst(0);
        createBurst(300); // Stage 2 burst
    }

    /* =========================================
       4. POMODORO DRAG & DROP + LOGIC
    ========================================= */
    const pomodoro = document.getElementById('pomodoro');
    let isDragging = false;
    let offsetX, offsetY;

    pomodoro.addEventListener('mousedown', (e) => {
        isDragging = true;
        offsetX = e.clientX - pomodoro.getBoundingClientRect().left;
        offsetY = e.clientY - pomodoro.getBoundingClientRect().top;
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let x = e.clientX - offsetX;
        let y = e.clientY - offsetY;
        
        // Screen boundary collision
        x = Math.max(0, Math.min(x, window.innerWidth - pomodoro.offsetWidth));
        y = Math.max(0, Math.min(y, window.innerHeight - pomodoro.offsetHeight));

        pomodoro.style.left = `${x}px`;
        pomodoro.style.top = `${y}px`;
        pomodoro.style.right = 'auto'; // override default right
    });

    document.addEventListener('mouseup', () => { isDragging = false; });

    let time = 25 * 60;
    setInterval(() => {
        if(time <= 0) return;
        time--;
        const m = Math.floor(time / 60).toString().padStart(2, '0');
        const s = (time % 60).toString().padStart(2, '0');
        document.getElementById('timer-text').innerText = `${m}:${s}`;
        
        // Stress Mode if time < 1 min
        if(time < 60 && !document.body.classList.contains('stress-beat')) {
            document.body.classList.add('stress-beat');
            setTimeout(() => document.body.classList.remove('stress-beat'), 1000);
        }
    }, 1000);

    function changePomodoro(themeClass, shapeClass) {
        pomodoro.className = '';
        pomodoro.classList.add(themeClass, shapeClass);
    }

    /* =========================================
       5. MODALS & BOSS MODE
    ========================================= */
    function toggleBossMode() {
        isBossMode = !isBossMode;
        if(isBossMode) document.documentElement.classList.add('boss-mode');
        else document.documentElement.classList.remove('boss-mode');
    }

    function openThemeModal() { document.getElementById('theme-modal').style.display = 'flex'; }
    function closeThemeModal() { document.getElementById('theme-modal').style.display = 'none'; }
    function setTheme(index) { 
        currentTheme = index; 
        initThemeData(); 
        closeThemeModal();
    }

    /* =========================================
       6. CANVAS BACKGROUND ENGINE (10 THEMES)
    ========================================= */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    let currentTheme = 5; // Default Matrix Rain
    let timeVar = 0;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function initThemeData() {
        particles = [];
        if (currentTheme === 1 || currentTheme === 2 || currentTheme === 4 || currentTheme === 6 || currentTheme === 8) {
            // Populate particles for Network, Starfield, Hearts, Bokeh, Hexagons
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * width, // for 3D
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    radius: Math.random() * 5 + 1
                });
            }
        }
        if (currentTheme === 5) {
            // Matrix columns
            const cols = Math.floor(width / 20);
            for(let i=0; i<cols; i++) particles.push({ x: i*20, y: Math.random() * height });
        }
    }

    function drawTheme() {
        ctx.clearRect(0, 0, width, height);
        timeVar += 0.05;

        // Theme Definitions
        if (currentTheme === 0) { // ECG Pulse
            ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 3; ctx.beginPath();
            for(let x=0; x<width; x+=5) {
                let y = height/2;
                let offset = (x - (timeVar * 100) % width);
                if(offset > 0 && offset < 50) y -= Math.sin(offset * 0.2) * 100; // heartbeat spike
                if(x===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
        } 
        else if (currentTheme === 1) { // Particle Network
            ctx.fillStyle = '#1dd1a1'; ctx.strokeStyle = 'rgba(29, 209, 161, 0.2)';
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>width) p.vx*=-1; if(p.y<0||p.y>height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                for(let j=i+1; j<particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x-p2.x, p.y-p2.y);
                    if(dist < 100) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                }
            });
        }
        else if (currentTheme === 2) { // Starfield Hyperspace
            ctx.fillStyle = 'white';
            particles.forEach(p => {
                p.z -= 5; if(p.z <= 0) p.z = width;
                const sx = (p.x - width/2) * (width / p.z) + width/2;
                const sy = (p.y - height/2) * (width / p.z) + height/2;
                const r = Math.max(0.1, 3 * (1 - p.z/width));
                ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
            });
        }
        else if (currentTheme === 3) { // DNA Helix
            ctx.strokeStyle = 'rgba(255,100,100,0.5)'; ctx.fillStyle = '#fff';
            for(let i=0; i<height; i+=30) {
                let x1 = width/2 + Math.sin(timeVar + i*0.05) * 100;
                let x2 = width/2 + Math.sin(timeVar + i*0.05 + Math.PI) * 100;
                ctx.beginPath(); ctx.moveTo(x1, i); ctx.lineTo(x2, i); ctx.stroke();
                ctx.beginPath(); ctx.arc(x1, i, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(x2, i, 4, 0, Math.PI*2); ctx.fill();
            }
        }
        else if (currentTheme === 4) { // Floating Hearts
            ctx.font = '20px Arial';
            particles.forEach(p => {
                p.y -= p.radius; if(p.y < -20) p.y = height + 20;
                ctx.fillText('❤️', p.x + Math.sin(timeVar + p.y*0.01)*20, p.y);
            });
        }
        else if (currentTheme === 5) { // Medical Matrix
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0,0,width,height);
            ctx.fillStyle = '#0f0'; ctx.font = '15px monospace';
            const medTerms = ['ECG', 'CPR', 'DNA', 'RNA', 'CABG', 'PCI', '120/80'];
            particles.forEach(p => {
                const text = medTerms[Math.floor(Math.random()*medTerms.length)];
                ctx.fillText(text, p.x, p.y);
                p.y += 20; if(p.y > height && Math.random() > 0.95) p.y = 0;
            });
        }
        else if (currentTheme === 6) { // Bokeh Lights
            particles.forEach(p => {
                p.y -= p.vy * 0.5; p.x += p.vx * 0.5;
                if(p.y < -50) p.y = height+50;
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius*10);
                grad.addColorStop(0, `rgba(255, 200, 100, ${Math.abs(Math.sin(timeVar+p.x)) * 0.3})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius*10, 0, Math.PI*2); ctx.fill();
            });
        }
        else if (currentTheme === 7) { // Synthwave Grid
            ctx.strokeStyle = '#ff00ff'; ctx.lineWidth = 2;
            for(let i=0; i<width; i+=50) {
                ctx.beginPath(); ctx.moveTo(width/2, height/2); ctx.lineTo(i, height); ctx.stroke();
            }
            let yOffset = (timeVar * 20) % 50;
            for(let j=height/2; j<height; j+= (j-height/2)*0.1 + 5) {
                ctx.beginPath(); ctx.moveTo(0, j + yOffset); ctx.lineTo(width, j + yOffset); ctx.stroke();
            }
            // Sun
            const sunGrad = ctx.createLinearGradient(0, height/2-150, 0, height/2);
            sunGrad.addColorStop(0, '#ffeb3b'); sunGrad.addColorStop(1, '#ff00ff');
            ctx.fillStyle = sunGrad; ctx.beginPath(); ctx.arc(width/2, height/2-50, 100, 0, Math.PI, true); ctx.fill();
        }
        else if (currentTheme === 8) { // Hexagon Tech
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 1;
            particles.forEach(p => {
                p.y -= p.radius*0.5; if(p.y < -50) p.y = height + 50;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(timeVar * p.vx);
                ctx.beginPath();
                for(let i=0; i<6; i++) {
                    ctx.lineTo(p.radius*5 * Math.cos(i*Math.PI/3), p.radius*5 * Math.sin(i*Math.PI/3));
                }
                ctx.closePath(); ctx.stroke(); ctx.restore();
            });
        }
        else if (currentTheme === 9) { // Aurora Waves
            const grd = ctx.createLinearGradient(0, 0, width, height);
            grd.addColorStop(0, `hsla(${(timeVar*10)%360}, 100%, 50%, 0.2)`);
            grd.addColorStop(1, `hsla(${((timeVar*10)+100)%360}, 100%, 50%, 0.2)`);
            ctx.fillStyle = grd;
            ctx.beginPath(); ctx.moveTo(0, height);
            for(let x=0; x<=width; x+=20) {
                ctx.lineTo(x, height/2 + Math.sin(x*0.01 + timeVar)*150 + Math.cos(x*0.005 - timeVar)*100);
            }
            ctx.lineTo(width, height); ctx.fill();
        }

        requestAnimationFrame(drawTheme);
    }

    function initCanvasEngine() {
        initThemeData();
        drawTheme();
    }
</script>
