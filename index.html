<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced MCQ Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        h1, h2 { text-align: center; color: var(--primary); }
        
        .hidden { display: none !important; }

        /* Setup Screen */
        .setup-group {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        label { display: block; margin-bottom: 8px; font-weight: 600; }
        
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 10px;
            border: 1px dashed var(--primary);
            border-radius: 6px;
            cursor: pointer;
        }

        select, .toggle-label {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 16px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        /* Quiz Screen */
        .header-info {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border);
        }

        .timer { font-size: 1.2rem; color: var(--danger); }
        
        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            text-align: left;
            padding: 15px;
            border-radius: 8px;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #eff6ff;
        }

        .option-btn.correct {
            background-color: #dcfce7;
            border-color: var(--success);
            color: #14532d;
        }

        .option-btn.wrong {
            background-color: #fee2e2;
            border-color: var(--danger);
            color: #7f1d1d;
        }

        .rationale-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #fffbeb;
            border-left: 4px solid #f59e0b;
            border-radius: 4px;
            animation: fadeIn 0.5s ease;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: flex-end;
        }

        #nextBtn { width: auto; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container" id="setupScreen">
    <h1>MCQ Simulator Setup</h1>
    
    <div class="setup-group">
        <label for="qbankUpload">1. Upload Question Bank (JSON)</label>
        <input type="file" id="qbankUpload" accept=".json">
        <small id="uploadStatus" style="color: var(--success); display: none; margin-top: 5px;">File loaded successfully!</small>
    </div>

    <div class="setup-group">
        <label for="timingMode">2. Select Timing Mode</label>
        <select id="timingMode">
            <option value="none">No Timer (Relaxed Mode)</option>
            <option value="pomodoro">Pomodoro (25 Minutes Total)</option>
            <option value="stress">Stress Mode (15 Seconds per Question)</option>
        </select>
    </div>

    <div class="setup-group">
        <label>3. Gameplay Rules</label>
        <div class="toggle-container">
            <input type="checkbox" id="instantAnswer" checked>
            <label for="instantAnswer" style="margin:0; font-weight: normal;">Instant Show Answer & Rationale</label>
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="shuffleQuestions" checked>
            <label for="shuffleQuestions" style="margin:0; font-weight: normal;">Shuffle Questions</label>
        </div>
        <div class="toggle-container">
            <input type="checkbox" id="shuffleOptions" checked>
            <label for="shuffleOptions" style="margin:0; font-weight: normal;">Shuffle Options inside Questions</label>
        </div>
    </div>

    <button id="startBtn" disabled>Start Examination</button>
</div>

<div class="container hidden" id="quizScreen">
    <div class="header-info">
        <div id="progressText">Question 1 of 10</div>
        <div class="timer" id="timerDisplay"></div>
        <div id="scoreText">Score: 0</div>
    </div>

    <div class="question-text" id="questionText">Loading question...</div>
    
    <div class="options-grid" id="optionsContainer"></div>

    <div class="rationale-box hidden" id="rationaleContainer">
        <strong>Rationale:</strong> <span id="rationaleText"></span>
    </div>

    <div class="controls">
        <button id="nextBtn" class="hidden">Next Question</button>
    </div>
</div>

<div class="container hidden" id="resultScreen">
    <h1>Examination Complete!</h1>
    <h2 id="finalScore">Your Score: 0%</h2>
    <p style="text-align: center;" id="resultMessage"></p>
    <button onclick="location.reload()" style="margin-top: 20px;">Restart Simulator</button>
</div>

<script>
    // App State
    let qbank = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft;
    let settings = {};

    // DOM Elements
    const setupScreen = document.getElementById('setupScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const startBtn = document.getElementById('startBtn');
    const qbankUpload = document.getElementById('qbankUpload');
    const optionsContainer = document.getElementById('optionsContainer');
    const nextBtn = document.getElementById('nextBtn');

    // Utility: Shuffle Array (Fisher-Yates)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Handle File Upload
    qbankUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    qbank = JSON.parse(e.target.result);
                    document.getElementById('uploadStatus').style.display = 'block';
                    startBtn.disabled = false;
                } catch (error) {
                    alert("Invalid JSON file format.");
                }
            };
            reader.readAsText(file);
        }
    });

    // Start Quiz
    startBtn.addEventListener('click', () => {
        settings = {
            mode: document.getElementById('timingMode').value,
            instant: document.getElementById('instantAnswer').checked,
            shuffleQ: document.getElementById('shuffleQuestions').checked,
            shuffleO: document.getElementById('shuffleOptions').checked
        };

        if (settings.shuffleQ) shuffleArray(qbank);
        
        setupScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');

        if (settings.mode === 'pomodoro') {
            timeLeft = 25 * 60; // 25 minutes
            startTimer(true);
        }

        loadQuestion();
    });

    function loadQuestion() {
        if (currentQuestionIndex >= qbank.length) {
            endQuiz();
            return;
        }

        // Reset UI
        optionsContainer.innerHTML = '';
        document.getElementById('rationaleContainer').classList.add('hidden');
        nextBtn.classList.add('hidden');
        
        const q = qbank[currentQuestionIndex];
        document.getElementById('progressText').innerText = `Question ${currentQuestionIndex + 1} of ${qbank.length}`;
        document.getElementById('questionText').innerText = q.question;

        let options = [...q.options];
        if (settings.shuffleO) shuffleArray(options);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswerSelection(btn, opt, q);
            optionsContainer.appendChild(btn);
        });

        // Stress mode timer
        if (settings.mode === 'stress') {
            clearInterval(timerInterval);
            timeLeft = 15; // 15 seconds per question
            startTimer(false);
        }
    }

    function handleAnswerSelection(selectedBtn, selectedText, questionData) {
        // Disable all buttons to prevent multiple clicks
        const allBtns = optionsContainer.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        
        if (settings.mode === 'stress') clearInterval(timerInterval);

        const isCorrect = selectedText === questionData.answer;
        
        if (isCorrect) {
            score++;
            document.getElementById('scoreText').innerText = `Score: ${score}`;
            if (settings.instant) triggerCelebrate();
        }

        if (settings.instant) {
            // Show correctness visually
            allBtns.forEach(btn => {
                if (btn.innerText === questionData.answer) {
                    btn.classList.add('correct');
                } else if (btn === selectedBtn && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });

            // Show rationale
            document.getElementById('rationaleText').innerText = questionData.rationale;
            document.getElementById('rationaleContainer').classList.remove('hidden');
        } else {
            // If not instant, just highlight the selected one neutrally
            selectedBtn.style.borderColor = "var(--primary)";
            selectedBtn.style.backgroundColor = "#eff6ff";
        }

        nextBtn.classList.remove('hidden');
    }

    nextBtn.addEventListener('click', () => {
        currentQuestionIndex++;
        loadQuestion();
    });

    function startTimer(isGlobal) {
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (isGlobal) {
                    endQuiz();
                } else {
                    // Stress mode timeout - auto mark wrong and move on
                    handleAnswerSelection(document.createElement('button'), "TIMEOUT", qbank[currentQuestionIndex]);
                }
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const display = document.getElementById('timerDisplay');
        if (settings.mode === 'none') {
            display.innerText = '';
            return;
        }
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        display.innerText = `⏱ ${m}:${s}`;
    }

    function triggerCelebrate() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42']
        });
    }

    function endQuiz() {
        clearInterval(timerInterval);
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        
        const percentage = Math.round((score / qbank.length) * 100);
        document.getElementById('finalScore').innerText = `Final Score: ${score}/${qbank.length} (${percentage}%)`;
        
        const msg = document.getElementById('resultMessage');
        if (percentage >= 80) {
            msg.innerText = "Outstanding clinical reasoning! You've mastered this material.";
            triggerCelebrate();
            setTimeout(triggerCelebrate, 1000); // Double celebration for high score
        } else {
            msg.innerText = "Keep reviewing your rationales. You'll get it next time!";
        }
    }
</script>
</body>
</html>
