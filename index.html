<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار MCQ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            direction: ltr; /* لعرض الأسئلة الإنجليزية بشكل صحيح */
            text-align: left;
        }
        .options-list {
            list-style-type: none;
            padding: 0;
            direction: ltr;
        }
        .options-list li {
            margin-bottom: 10px;
        }
        .options-list label {
            display: flex;
            align-items: center;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #ddd;
        }
        .options-list label:hover {
            background: #eef2f5;
        }
        .options-list input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #004494;
        }
        #result-container {
            margin-top: 20px;
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
        }
        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: none;
            direction: ltr;
            text-align: left;
        }
        .correct-feedback { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong-feedback { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2 style="text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px;">الاختبار النهائي</h2>
    <div id="quiz-content">
        <p style="text-align: center;">جاري تحميل الأسئلة...</p>
    </div>
    <button class="btn-submit" id="submit-btn" style="display: none;" onclick="calculateScore()">تقديم الإجابات</button>
    <div id="result-container"></div>
</div>

<script>
    let questionsData = [];

    // دالة لجلب الأسئلة من ملف JSON
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            questionsData = await response.json();
            renderQuestions();
        } catch (error) {
            document.getElementById('quiz-content').innerHTML = '<p style="color:red; text-align:center;">حدث خطأ في تحميل بنك الأسئلة. تأكد من تشغيل الصفحة عبر سيرفر محلي (Live Server).</p>';
            console.error('Error loading questions:', error);
        }
    }

    // دالة لعرض الأسئلة في الصفحة
    function renderQuestions() {
        const container = document.getElementById('quiz-content');
        container.innerHTML = ''; // مسح رسالة التحميل

        questionsData.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-block';
            
            // بناء الخيارات
            let optionsHTML = '';
            q.options.forEach((opt, optIndex) => {
                optionsHTML += `
                    <li>
                        <label>
                            <input type="radio" name="question_${index}" value="${optIndex}">
                            ${opt}
                        </label>
                    </li>
                `;
            });

            questionDiv.innerHTML = `
                <div class="question-text">${index + 1}. ${q.question}</div>
                <ul class="options-list">
                    ${optionsHTML}
                </ul>
                <div id="feedback_${index}" class="feedback"></div>
            `;
            container.appendChild(questionDiv);
        });

        // إظهار زر التقديم بعد تحميل الأسئلة
        document.getElementById('submit-btn').style.display = 'block';
    }

    // دالة لحساب النتيجة وإظهار التبرير (Explanation)
    function calculateScore() {
        let score = 0;
        let allAnswered = true;

        questionsData.forEach((q, index) => {
            const selectedOption = document.querySelector(`input[name="question_${index}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback_${index}`);
            
            if (!selectedOption) {
                allAnswered = false;
            } else {
                const answerValue = parseInt(selectedOption.value);
                feedbackDiv.style.display = 'block';

                if (answerValue === q.correctIndex) {
                    score++;
                    feedbackDiv.className = 'feedback correct-feedback';
                    feedbackDiv.innerHTML = `<strong>Correct!</strong> <br> ${q.explanation}`;
                } else {
                    feedbackDiv.className = 'feedback wrong-feedback';
                    feedbackDiv.innerHTML = `<strong>Incorrect.</strong> The correct answer was: ${q.options[q.correctIndex]}. <br><br> <em>Explanation:</em> ${q.explanation}`;
                }
            }
        });

        if (!allAnswered) {
            alert("يرجى الإجابة على جميع الأسئلة قبل التقديم.");
            return;
        }

        const resultContainer = document.getElementById('result-container');
        resultContainer.innerHTML = `النتيجة النهائية: ${score} من ${questionsData.length}`;
        document.getElementById('submit-btn').disabled = true;
    }

    // بدء تشغيل الدالة عند تحميل الصفحة
    window.onload = loadQuestions;
</script>

</body>
</html>
