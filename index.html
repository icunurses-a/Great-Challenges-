<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Gateway</title>
    
    <!-- تضمين مكتبة EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // قم بتهيئة EmailJS باستخدام الـ Public Key الخاص بك (ستحصل عليه من الموقع)
        (function() {
            emailjs.init("YOUR_PUBLIC_KEY_HERE");
        })();
    </script>

    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #7000ff;
            --bg-dark: #0f0c29;
            --text-light: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, var(--bg-dark), #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: var(--text-light);
        }

        /* Wavy/Electrical Background Elements */
        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,255,204,0.1) 0%, transparent 60%);
            top: -50%;
            left: -50%;
            animation: rotateWave 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        .wave:nth-child(2) {
            background: radial-gradient(circle, rgba(112,0,255,0.15) 0%, transparent 60%);
            animation: rotateWave 15s linear infinite reverse;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes rotateWave {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Glassmorphism Container */
        .container {
            position: relative;
            width: 400px;
            min-height: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            z-index: 10;
            overflow: hidden;
            transition: height 0.3s ease;
        }

        .form-box {
            position: absolute;
            top: 40px;
            left: 40px;
            right: 40px;
            transition: all 0.5s ease-in-out;
            opacity: 0;
            transform: translateX(400px);
            pointer-events: none;
        }

        .form-box.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        h2 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 0;
            font-size: 16px;
            color: var(--text-light);
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            outline: none;
            background: transparent;
            transition: border-color 0.3s ease;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -20px;
            font-size: 12px;
            color: var(--primary);
        }

        .input-group input:focus {
            border-bottom: 2px solid var(--primary);
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        button.submit-btn:hover {
            background: var(--primary);
            color: var(--bg-dark);
            box-shadow: 0 0 25px var(--primary);
        }

        button.submit-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .toggle-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .toggle-links a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 5px;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .toggle-links a:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Success Animation Effects */
        #success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 12, 41, 0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #success-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .electrical-ring {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary), inset 0 0 20px var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulseRing 2s infinite, waveDistortion 3s linear infinite;
        }

        .checkmark {
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #success-overlay.show .checkmark {
            opacity: 1;
            transform: scale(1);
            transition-delay: 0.3s;
        }

        .success-text {
            margin-top: 30px;
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        #success-overlay.show .success-text {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.5s;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.9); box-shadow: 0 0 10px var(--primary), inset 0 0 10px var(--primary); }
            50% { transform: scale(1.1); box-shadow: 0 0 40px var(--primary), inset 0 0 30px var(--primary); }
            100% { transform: scale(0.9); box-shadow: 0 0 10px var(--primary), inset 0 0 10px var(--primary); }
        }

        @keyframes waveDistortion {
            0% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
            33% { border-radius: 55% 45% 60% 40% / 40% 60% 45% 55%; }
            66% { border-radius: 45% 55% 40% 60% / 60% 40% 55% 45%; }
            100% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
        }

        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="wave"></div>
    <div class="wave"></div>

    <div class="container" id="main-container">
        <!-- Login Form -->
        <div class="form-box active" id="login-form">
            <h2>Login</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <input type="text" id="username" required>
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required>
                    <label>Password</label>
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">System Entry</button>
                <div class="toggle-links">
                    <a onclick="switchForm('forgot-form')">Forgot Password?</a><br><br>
                    <span>No account? </span><a onclick="switchForm('signup-form')">Sign Up</a>
                </div>
            </form>
        </div>

        <!-- Signup Form -->
        <div class="form-box" id="signup-form">
            <h2>Sign Up</h2>
            <form onsubmit="event.preventDefault(); switchForm('login-form');">
                <div class="input-group">
                    <input type="text" required>
                    <label>Username</label>
                </div>
                <div class="input-group">
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <button type="submit" class="submit-btn">Initialize Account</button>
                <div class="toggle-links">
                    <span>Already authorized? </span><a onclick="switchForm('login-form')">Login</a>
                </div>
            </form>
        </div>

        <!-- Forgot Password Form -->
        <div class="form-box" id="forgot-form">
            <h2>Reset Data</h2>
            <form onsubmit="event.preventDefault(); switchForm('login-form');">
                <div class="input-group">
                    <input type="email" required>
                    <label>Recovery Email</label>
                </div>
                <button type="submit" class="submit-btn">Send Recovery Code</button>
                <div class="toggle-links">
                    <a onclick="switchForm('login-form')">Return to Login</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">&copy; AMER ALSHARIF 2026</div>

    <!-- Success Animation Overlay -->
    <div id="success-overlay">
        <div class="electrical-ring">
            <div class="checkmark">✓</div>
        </div>
        <div class="success-text">ACCESS GRANTED</div>
    </div>

    <script>
        function switchForm(formId) {
            document.querySelectorAll('.form-box').forEach(box => {
                box.classList.remove('active');
                box.style.transform = 'translateX(-400px)';
                box.style.opacity = '0';
            });

            setTimeout(() => {
                document.querySelectorAll('.form-box').forEach(box => {
                    if(box.id !== formId) box.style.transform = 'translateX(400px)';
                });
                
                const targetForm = document.getElementById(formId);
                targetForm.classList.add('active');
                targetForm.style.transform = 'translateX(0)';
                targetForm.style.opacity = '1';
                
                const container = document.getElementById('main-container');
                if(formId === 'signup-form') {
                    container.style.minHeight = '550px';
                } else if(formId === 'forgot-form') {
                    container.style.minHeight = '400px';
                } else {
                    container.style.minHeight = '500px';
                }
            }, 300);
        }

        // جلب معلومات المتصفح ونظام التشغيل
        function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            let deviceType = "Desktop";
            if (/Mobi|Android/i.test(userAgent)) deviceType = "Mobile";
            else if (/Tablet|iPad/i.test(userAgent)) deviceType = "Tablet";
            
            return `${deviceType} - ${userAgent}`;
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const username = document.getElementById('username').value;
            btn.disabled = true;
            btn.innerText = "Authenticating...";

            let locationData = "Location unavailable";
            
            // محاولة جلب الموقع بناءً على عنوان الـ IP
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                locationData = `${data.city}, ${data.region}, ${data.country_name} (IP: ${data.ip})`;
            } catch (error) {
                console.error("Could not fetch location data", error);
            }

            const deviceInfo = getDeviceInfo();

            // إعداد البيانات التي سيتم إرسالها عبر البريد
            const templateParams = {
                to_email: 'icunurses@hotmail.com',
                user_name: username,
                device_info: deviceInfo,
                location: locationData,
                time: new Date().toLocaleString()
            };

            // إرسال البريد باستخدام EmailJS
            /* 
               ملاحظة مهمة: ستحتاج لإنشاء حساب في emailjs.com
               ثم تغيير "YOUR_SERVICE_ID" و "YOUR_TEMPLATE_ID" 
               بالمعلومات الخاصة بك لكي يعمل الإرسال فعلياً.
            */
            try {
                // await emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams);
                console.log("Email sent parameters:", templateParams); // لغرض التجربة
                
                // إظهار التأثير البصري للنجاح
                const overlay = document.getElementById('success-overlay');
                overlay.classList.add('show');

                setTimeout(() => {
                    overlay.classList.remove('show');
                    btn.disabled = false;
                    btn.innerText = "System Entry";
                    // window.location.href = 'dashboard.html';
                }, 3500);

            } catch (error) {
                console.error("Failed to send email", error);
                alert("Login recorded locally, but email notification failed.");
                btn.disabled = false;
                btn.innerText = "System Entry";
            }
        }
    </script>
</body>
</html>
