              <label className="block text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider">Difficulty Mode</label>
              <select className="w-full bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-3 outline-none" value={settings.mode} onChange={e => update('mode', e.target.value)}>
                <option value="Easy">Easy (Auto Hints)</option>
                <option value="Comprehensive">Comprehensive (No Hints)</option>
              </select>
            </div>

            <div className="space-y-2">
              <label className="block text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider">Theme</label>
              <select className="w-full bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-3 outline-none" value={settings.theme} onChange={e => update('theme', e.target.value)}>
                {['Midnight', 'Dawn', 'Ocean', 'Forest', 'Ember'].map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div className="space-y-2">
              <label className="block text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider">Timer Type</label>
              <select className="w-full bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-3 outline-none" value={settings.timerType} onChange={e => update('timerType', e.target.value)}>
                {['Per-exam', 'Per-question', 'Off'].map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div className="space-y-2">
              <label className="block text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider">Timer Size</label>
              <select className="w-full bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-3 outline-none" value={settings.timerSize} onChange={e => update('timerSize', e.target.value)} disabled={settings.timerType === 'Off'}>
                {['Small', 'Big', 'Extra Big'].map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div className="space-y-2">
              <label className="block text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider">Celebration Style</label>
              <select className="w-full bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-3 outline-none" value={settings.celebration} onChange={e => update('celebration', e.target.value)}>
                {['Confetti', 'Fireworks', 'Stars', 'Checkmark', 'None'].map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div className="space-y-2">
              <label className="block text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider">Option Emojis</label>
              <select className="w-full bg-[var(--bg-base)] border border-[var(--border)] rounded-lg p-3 outline-none" value={settings.emojiStyle} onChange={e => update('emojiStyle', e.target.value)}>
                {['None', 'Letters', 'Circles', 'Animals', 'Food', 'Objects'].map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>

            <div className="space-y-4 col-span-1 md:col-span-2 pt-4 flex items-center justify-start gap-6">
              <label className="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" className="w-5 h-5 accent-[var(--primary)]" checked={settings.shuffleQ} onChange={e => update('shuffleQ', e.target.checked)} />
                <span>Shuffle Questions</span>
              </label>
              <label className="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" className="w-5 h-5 accent-[var(--primary)]" checked={settings.shuffleA} onChange={e => update('shuffleA', e.target.checked)} />
                <span>Shuffle Answers</span>
              </label>
            </div>
          </div>

          <div className="flex justify-center pt-4">
            <button onClick={() => startExam()} className="themed-button px-10 py-4 rounded-xl text-xl font-bold shadow-lg flex items-center gap-2 transform transition hover:scale-105">
              Start Exam 
              <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            </button>
          </div>

          <div className="pt-12">
            <h2 className="text-2xl font-bold mb-6 text-center text-[var(--text-muted)] border-b border-[var(--border)] pb-2">Modern Study Techniques</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {techniques.map(t => (
                <div key={t.title} className="themed-card p-4 rounded-xl border border-[var(--border)] shadow-sm hover:shadow-md transition">
                  <h3 className="font-bold text-[var(--primary)] text-lg mb-1">{t.title}</h3>
                  <p className="text-sm opacity-90">{t.text}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // EXAM SCREEN
    // ==========================================
    const ExamScreen = ({ questions, currentIdx, setCurrentIdx, answers, handleAnswer, handleSkip, handleFlag, endExam, settings, globalTime, questionTime, goNext, goPrev }) => {
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [reviewModalOpen, setReviewModalOpen] = useState(false);
      const [manualHintOpen, setManualHintOpen] = useState(false);
      
      const q = questions[currentIdx];
      const ansData = answers[currentIdx] || {};
      const isAnswered = ansData.selected !== undefined;
      const isSkipped = ansData.skipped;

      useEffect(() => {
        setManualHintOpen(false); // reset manual hint on question change
      }, [currentIdx]);

      // H keybinding for Hint
      useEffect(() => {
        const handleH = (e) => {
          if(e.key.toLowerCase() === 'h' && settings.mode === 'Comprehensive') setManualHintOpen(true);
        }
        window.addEventListener('keydown', handleH);
        return () => window.removeEventListener('keydown', handleH);
      }, [settings.mode]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
      };

      const timerClass = settings.timerSize === 'Small' ? 'text-xl' : settings.timerSize === 'Big' ? 'text-4xl font-bold' : 'text-7xl font-black tracking-tighter';
      const emojis = {
        'None': ['','','',''],
        'Letters': ['A. ', 'B. ', 'C. ', 'D. '],
        'Circles': ['🔴 ', '🔵 ', '🟡 ', '🟢 '],
        'Animals': ['🐶 ', '🐱 ', '🦊 ', '🐼 '],
        'Food': ['🍎 ', '🍔 ', '🍕 ', '🍩 '],
        'Objects': ['🚗 ', '🚀 ', '⌚ ', '💡 ']
      }[settings.emojiStyle];

      const Sidebar = () => (
        <div className={`themed-sidebar flex-shrink-0 flex flex-col transition-all duration-300 ${sidebarOpen ? 'w-64 md:w-80' : 'w-0 overflow-hidden opacity-0'}`}>
          <div className="p-4 border-b themed-border font-bold text-lg flex justify-between items-center whitespace-nowrap">
            Navigator
            <button onClick={() => setSidebarOpen(false)} className="text-[var(--text-muted)] hover:text-white md:hidden">
               <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>
          <div className="p-4 overflow-y-auto flex-1 grid grid-cols-5 gap-2 content-start">
            {questions.map((_, i) => {
              const a = answers[i] || {};
              let statusClass = "bg-[var(--bg-base)] border-[var(--border)] text-[var(--text-muted)] hover:bg-[var(--primary)] hover:text-white";
              if (a.correct === true) statusClass = "status-correct";
              else if (a.correct === false && !a.skipped) statusClass = "status-incorrect";
              else if (a.skipped) statusClass = "status-skipped";
              
              return (
                <button 
                  key={i} 
                  onClick={() => setCurrentIdx(i)}
                  className={`w-10 h-10 rounded-md border flex items-center justify-center font-bold text-sm transition-all relative ${statusClass} ${currentIdx === i ? 'ring-2 ring-[var(--primary)] ring-offset-2 ring-offset-[var(--bg-sidebar)] scale-110 z-10' : ''} ${a.flagged ? 'status-flagged' : ''}`}
                >
                  {i + 1}
                </button>
              )
            })}
          </div>
        </div>
      );

      return (
        <div className="flex h-screen overflow-hidden">
          <Sidebar />
          
          <div className="flex-1 flex flex-col relative h-full">
            {/* Top Toolbar */}
            <div className="h-16 border-b themed-border flex items-center justify-between px-4 themed-card shrink-0">
              <div className="flex items-center gap-4">
                {!sidebarOpen && (
                  <button onClick={() => setSidebarOpen(true)} className="p-2 bg-[var(--bg-base)] rounded-md border themed-border hover:bg-[var(--border)]">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                  </button>
                )}
                <span className="font-bold text-lg text-[var(--text-muted)]">Q: {currentIdx + 1} / {questions.length}</span>
              </div>
              
              {settings.timerType !== 'Off' && (
                <div className={`font-mono text-[var(--primary)] ${timerClass} transition-all`}>
                  {settings.timerType === 'Per-exam' ? formatTime(globalTime) : formatTime(questionTime)}
                </div>
              )}
              
              <button onClick={endExam} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg transition text-sm">
                End Exam
              </button>
            </div>

            {/* Main Content Area */}
            <div className="flex-1 overflow-y-auto p-4 md:p-8">
              <div className="max-w-4xl mx-auto space-y-6">
                
                {/* Header info */}
                <div className="flex justify-between items-center text-sm font-semibold text-[var(--text-muted)] uppercase tracking-widest border-b themed-border pb-2">
                  <span className="flex items-center gap-2">
                     <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                     {q.src}
                  </span>
                  <span className="flex items-center gap-3">
                    <button onClick={handleFlag} className={`flex items-center gap-1 px-3 py-1 rounded-full border transition ${ansData.flagged ? 'bg-orange-500/20 border-orange-500 text-orange-500' : 'border-transparent hover:bg-[var(--border)]'}`}>
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z" clipRule="evenodd" /></svg>
                      Flag [F]
                    </button>
                    {!isAnswered && (
                      <button onClick={handleSkip} className="flex items-center gap-1 px-3 py-1 rounded-full border border-transparent hover:bg-[var(--border)] transition">
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
                        Skip [S]
                      </button>
                    )}
                  </span>
                </div>

                {/* Question */}
                <h2 className="text-2xl md:text-3xl font-medium leading-relaxed">{q.q}</h2>

                {/* Options */}
                <div className="grid grid-cols-1 gap-3 pt-4">
                  {q.options.map((opt, i) => {
                    let styleClass = "bg-[var(--bg-card)] border-[var(--border)] hover:border-[var(--primary)] hover:bg-[var(--border)]";
                    if (isAnswered) {
                      if (i === q.ans) styleClass = "status-correct border-transparent ring-4 ring-green-500/30";
                      else if (i === ansData.selected) styleClass = "status-incorrect border-transparent ring-4 ring-red-500/30";
                      else styleClass = "opacity-50 grayscale bg-[var(--bg-base)] border-[var(--border)] cursor-not-allowed";
                    } else if (isSkipped) {
                      styleClass = "opacity-50 bg-[var(--bg-base)] border-[var(--border)] cursor-not-allowed";
                    }

                    return (
                      <button 
                        key={i} 
                        onClick={() => handleAnswer(i)}
                        disabled={isAnswered || isSkipped}
                        className={`text-left p-5 rounded-xl border-2 transition-all duration-200 text-lg flex items-start gap-3 shadow-sm ${styleClass}`}
                      >
                        <span className="font-bold opacity-80 mt-0.5">{emojis[i]}</span>
                        <span>{opt}</span>
                      </button>
                    )
                  })}
                </div>

                {/* Rationale & Hint */}
                <div className="pt-6 space-y-4">
                   {(settings.mode === 'Easy' && !isAnswered && !isSkipped) && (
                     <div className="p-4 bg-blue-500/10 border border-blue-500/30 rounded-lg text-blue-200 flex items-start gap-3">
                       <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                       <p><strong className="text-blue-400">Hint:</strong> {q.hint}</p>
                     </div>
                   )}
                   {(settings.mode === 'Comprehensive' && !isAnswered && !isSkipped && !manualHintOpen) && (
                     <button onClick={() => setManualHintOpen(true)} className="text-sm px-4 py-2 border border-[var(--border)] rounded hover:bg-[var(--border)] text-[var(--text-muted)]">Show Hint [H]</button>
                   )}
                   {(manualHintOpen && !isAnswered && !isSkipped) && (
                     <div className="p-4 bg-blue-500/10 border border-blue-500/30 rounded-lg text-blue-200">
                       <p><strong className="text-blue-400">Hint:</strong> {q.hint}</p>
                     </div>
                   )}

                   {(isAnswered) && (
                     <div className={`p-5 rounded-xl border ${ansData.correct ? 'bg-green-500/10 border-green-500/30' : 'bg-red-500/10 border-red-500/30'}`}>
                        <h4 className={`font-bold mb-1 flex items-center gap-2 ${ansData.correct ? 'text-green-400' : 'text-red-400'}`}>
                           {ansData.correct ? 'Correct!' : 'Incorrect'}
                        </h4>
                        <p className="opacity-90 leading-relaxed">{q.exp}</p>
                     </div>
                   )}
                </div>

                {/* Prev/Next Controls */}
                <div className="flex justify-between pt-8 border-t themed-border">
                   <button onClick={goPrev} disabled={currentIdx === 0} className="px-6 py-3 rounded-lg border themed-border bg-[var(--bg-card)] hover:bg-[var(--border)] disabled:opacity-30 flex items-center gap-2">
                     <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clipRule="evenodd" /></svg>
                     Prev
                   </button>
                   <button onClick={() => setReviewModalOpen(true)} className="px-6 py-3 rounded-lg text-[var(--text-muted)] hover:text-white hover:bg-[var(--border)] flex items-center gap-2">
                     <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                     Review
                   </button>
                   {currentIdx < questions.length - 1 ? (
                     <button onClick={goNext} className="themed-button px-6 py-3 rounded-lg flex items-center gap-2">
                       Next
                       <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clipRule="evenodd" /></svg>
                     </button>
                   ) : (
                     <button onClick={endExam} className="px-6 py-3 bg-[var(--primary)] text-white rounded-lg font-bold hover:brightness-110 flex items-center gap-2">
                        Finish Exam
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" /></svg>
                     </button>
                   )}
                </div>

              </div>
            </div>
          </div>
          
          {reviewModalOpen && <QuickReviewModal questions={questions} answers={answers} setOpen={setReviewModalOpen} jumpTo={setCurrentIdx} />}
        </div>
      )
    };

    // ==========================================
    // QUICK REVIEW MODAL
    // ==========================================
    const QuickReviewModal = ({ questions, answers, setOpen, jumpTo }) => {
      const [filter, setFilter] = useState('All');
      
      const filtered = questions.map((q,i) => ({i, q, a: answers[i]||{}})).filter(obj => {
        if (filter === 'All') return true;
        if (filter === 'Flagged') return obj.a.flagged;
        if (filter === 'Wrong') return obj.a.correct === false && !obj.a.skipped;
        if (filter === 'Skipped') return obj.a.skipped || obj.a.selected === undefined;
        return true;
      });

      return (
        <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-[9999] backdrop-blur-sm">
          <div className="bg-[var(--bg-base)] border border-[var(--border)] rounded-2xl w-full max-w-3xl h-[80vh] flex flex-col overflow-hidden shadow-2xl">
            <div className="p-4 border-b themed-border flex justify-between items-center bg-[var(--bg-card)]">
              <h3 className="text-xl font-bold">Quick Review</h3>
              <button onClick={() => setOpen(false)} className="text-[var(--text-muted)] hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div className="p-4 border-b themed-border flex gap-2 overflow-x-auto">
              {['All', 'Flagged', 'Wrong', 'Skipped'].map(f => (
                <button key={f} onClick={() => setFilter(f)} className={`px-4 py-2 rounded-full border text-sm font-semibold transition ${filter === f ? 'bg-[var(--primary)] border-[var(--primary)] text-white' : 'border-[var(--border)] text-[var(--text-muted)] hover:bg-[var(--border)]'}`}>
                  {f}
                </button>
              ))}
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-2">
              {filtered.length === 0 ? <p className="text-center text-[var(--text-muted)] mt-10">No questions match this filter.</p> : null}
              {filtered.map(obj => (
                <button key={obj.i} onClick={() => { jumpTo(obj.i); setOpen(false); }} className="w-full text-left p-4 rounded-xl border themed-border hover:bg-[var(--bg-card)] transition flex items-center justify-between gap-4 group">
                  <div className="flex items-center gap-4 flex-1 truncate">
                    <span className={`w-8 h-8 shrink-0 rounded-md border flex items-center justify-center text-xs font-bold ${obj.a.correct ? 'status-correct' : obj.a.correct === false && !obj.a.skipped ? 'status-incorrect' : obj.a.skipped ? 'status-skipped' : 'border-[var(--border)] bg-[var(--bg-base)] text-[var(--text-muted)]'}`}>{obj.i + 1}</span>
                    <span className="truncate text-sm opacity-90 group-hover:text-[var(--primary)] transition">{obj.q.q}</span>
                  </div>
                  {obj.a.flagged && <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-orange-500 shrink-0" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z" clipRule="evenodd" /></svg>}
                </button>
              ))}
            </div>
          </div>
        </div>
      )
    }

    // ==========================================
    // RESULTS SCREEN
    // ==========================================
    const ResultsScreen = ({ questions, answers, startExam, setView }) => {
      const total = questions.length;
      let correct = 0, wrong = 0, skipped = 0;
      
      const sourceMap = {};
      
      questions.forEach((q, i) => {
        const a = answers[i] || {};
        if (!sourceMap[q.src]) sourceMap[q.src] = { total: 0, correct: 0 };
        sourceMap[q.src].total++;
        
        if (a.correct === true) { correct++; sourceMap[q.src].correct++; }
        else if (a.correct === false && !a.skipped) wrong++;
        else skipped++;
      });
      
      const percentage = Math.round((correct / total) * 100) || 0;
      
      // Calculate circle dasharray for Score Ring
      const radius = 60;
      const circumference = 2 * Math.PI * radius;
      const strokeDashoffset = circumference - (percentage / 100) * circumference;

      return (
        <div className="max-w-4xl mx-auto p-6 py-12 space-y-12">
          
          <div className="text-center space-y-2">
            <h1 className="text-5xl font-extrabold tracking-tight text-[var(--primary)]">Exam Complete!</h1>
            <p className="text-lg text-[var(--text-muted)]">Here's a breakdown of your performance.</p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
            {/* Score Ring */}
            <div className="flex justify-center">
              <div className="relative w-48 h-48">
                <svg className="w-full h-full transform -rotate-90" viewBox="0 0 140 140">
                  <circle cx="70" cy="70" r={radius} className="stroke-[var(--border)]" strokeWidth="12" fill="none" />
                  <circle cx="70" cy="70" r={radius} className="stroke-[var(--primary)] transition-all duration-1000 ease-out" strokeWidth="12" fill="none" strokeLinecap="round" style={{ strokeDasharray: circumference, strokeDashoffset: strokeDashoffset }} />
                </svg>
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <span className="text-5xl font-black">{percentage}%</span>
                  <span className="text-sm font-bold text-[var(--text-muted)] uppercase tracking-widest">Score</span>
                </div>
              </div>
            </div>

            {/* Stats */}
            <div className="grid grid-cols-2 gap-4">
              <div className="themed-card p-6 rounded-2xl flex flex-col items-center justify-center border themed-border">
                <span className="text-4xl font-bold text-green-500">{correct}</span>
                <span className="text-sm text-[var(--text-muted)] font-semibold uppercase">Correct</span>
              </div>
              <div className="themed-card p-6 rounded-2xl flex flex-col items-center justify-center border themed-border">
                <span className="text-4xl font-bold text-red-500">{wrong}</span>
                <span className="text-sm text-[var(--text-muted)] font-semibold uppercase">Incorrect</span>
              </div>
              <div className="themed-card p-6 rounded-2xl flex flex-col items-center justify-center border themed-border">
                <span className="text-4xl font-bold text-yellow-500">{skipped}</span>
                <span className="text-sm text-[var(--text-muted)] font-semibold uppercase">Skipped</span>
              </div>
              <div className="themed-card p-6 rounded-2xl flex flex-col items-center justify-center border themed-border">
                <span className="text-4xl font-bold">{total}</span>
                <span className="text-sm text-[var(--text-muted)] font-semibold uppercase">Total Qs</span>
              </div>
            </div>
          </div>

          {/* Source Breakdown */}
          <div className="themed-card p-6 md:p-8 rounded-2xl border themed-border space-y-6">
             <h2 className="text-2xl font-bold border-b themed-border pb-4">Performance by Topic</h2>
             <div className="space-y-4">
                {Object.entries(sourceMap).map(([src, data]) => {
                  const p = Math.round((data.correct / data.total) * 100);
                  return (
                    <div key={src} className="space-y-2">
                      <div className="flex justify-between text-sm font-semibold">
                        <span className="opacity-90">{src}</span>
                        <span className={p > 70 ? 'text-green-400' : p > 40 ? 'text-yellow-400' : 'text-red-400'}>{data.correct} / {data.total} ({p}%)</span>
                      </div>
                      <div className="h-3 w-full bg-[var(--bg-base)] rounded-full overflow-hidden border border-[var(--border)]">
                        <div className="h-full bg-[var(--primary)] transition-all duration-1000" style={{ width: `${p}%`}}></div>
                      </div>
                    </div>
                  )
                })}
             </div>
          </div>

          <div className="flex flex-wrap justify-center gap-4 pb-10">
            {wrong > 0 && (
              <button onClick={() => startExam(true)} className="px-8 py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl shadow-lg transition transform hover:-translate-y-1">
                Retake Incorrect Only
              </button>
            )}
            <button onClick={() => setView('settings')} className="themed-button px-8 py-4 font-bold rounded-xl shadow-lg transition transform hover:-translate-y-1">
              Back to Start
            </button>
          </div>
          
        </div>
      );
    };

    // Render React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
